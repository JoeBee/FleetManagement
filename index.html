<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title>Multiple Tabs</title>
    <link rel="stylesheet"
          type="text/css"
          href="styles.css">
</head>

<body>

    <div class="tab">
        <button class="tablinks"
                onclick="openTab(event, 'Dashboard')">Dashboard</button>
        <button class="tablinks"
                onclick="openTab(event, 'Input')">Input</button>
        <button class="tablinks"
                onclick="openTab(event, 'Output')">Output</button>
    </div>

    <div id="Dashboard"
         class="tabcontent">
        <h3>Dashboard Content</h3>
        <p>This is the content for the Dashboard tab.</p>
    </div>

    <div id="Input"
         class="tabcontent">
        <h3>Input Content</h3>
        <p>This is the content for the Input tab.</p>
    </div>

    <div id="Output"
         class="tabcontent">
        <h3>Output Content</h3>
        <p>This is the content for the Output tab.</p>
    </div>

    <script src="script.js"></script>

</body>

</html>
